name: Build & Lint Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Linting & Prep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Go Tidy
        run: go mod tidy

      - name: Go Vet
        run: go vet ./...

      - name: Frontend Build Verification
        run: |
          cd frontend
          npm install
          npm run build

  build-macos:
    name: Build macOS Binary
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.1

      - name: Go Tidy
        run: go mod tidy

      - name: Build macOS Application Bundle
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -platform darwin
