<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stay Awake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <span class="logo-icon">⚡</span>
        <h1>Stay Awake</h1>
      </div>
      <div class="app-description">Keep your Mac awake while tasks execute.</div>
    </header>

    <!-- Main Controller Area -->
    <main class="control-panel">
      <div class="power-ring-container">
        <div id="power-ring" class="power-ring state-normal">
          <button id="toggle-btn" class="power-button" aria-label="Toggle Stay Awake">
            <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
              <line x1="12" y1="2" x2="12" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>

      <div class="status-box">
        <div id="status-label" class="status-label">NORMAL</div>
        <div id="status-desc" class="status-desc">System sleep is managed by macOS settings.</div>
      </div>
    </main>

    <!-- Settings Footer -->
    <footer class="settings-panel">
      <div class="setting-item">
        <div class="setting-info">
          <span class="setting-title">Launch at Login</span>
          <span class="setting-sub">Open the app automatically when starting up</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="launch-login-check">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-item">
        <div class="setting-info">
          <span class="setting-title">Start Minimized</span>
          <span class="setting-sub">Launch directly into the menu bar</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="start-minimized-check">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-item">
        <div class="setting-info text-warning">
          <span class="setting-title">Allow Lid-Close Run ⚠️</span>
          <span class="setting-sub">Keep running when lid is closed (Needs Admin)</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="lid-close-check">
          <span class="slider"></span>
        </label>
      </div>
    </footer>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
